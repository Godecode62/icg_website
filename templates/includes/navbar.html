{% load static %}

<style>
.navbar {
    background-color: #1a1a1a;
    padding: 1rem 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    width: 100%;
}

.navbar-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
}

.navbar-links {
    display: flex;
    gap: 2rem;
    align-items: center;
}

.nav-link {
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
}

.nav-link:hover {
    color: #007bff;
}

.logo-img {
    height: 40px;
    width: auto;
}

@media (max-width: 768px) {
    .navbar-links {
        display: none;
    }
}
</style>

<nav class="navbar">
    <div class="navbar-container">
        <a href="{% url 'show_entreprise' %}" class="navbar-logo">
            <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo-img">
        </a>

        <div class="navbar-links">
            <a href="{% url 'about' %}" class="nav-link">Accueil</a>
            <a href="{% url 'event_list' %}" class="nav-link">Événements</a>
            <a href="{% url 'job_list' %}" class="nav-link">Emplois</a>
            <a href="{% url 'training_list' %}" class="nav-link">Formations</a>
            <a href="{% url 'contact' %}" class="nav-link">Contact</a>
            {% if request.user.is_authenticated and request.user.is_superuser %}
                <a href="{% url 'contact_list' %}" class="nav-link">Gérer les messages</a>
                <a href="{% url 'job_application_list' %}" class="nav-link">Candidatures emploi</a>
                <a href="{% url 'training_application_list' %}" class="nav-link">Inscriptions formation</a>
                <a href="{% url 'logout' %}" class="nav-link">Déconnexion</a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link">Connexion</a>
            {% endif %}
        </div>

        <button class="mobile-menu-button">
            <div class="hamburger">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </div>
        </button>
    </div>
</nav>
